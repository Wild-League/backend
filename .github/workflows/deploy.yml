# Deploy to internal VM on every push to main.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST      — IP or hostname of your VM (e.g. 192.168.1.50)
#   DEPLOY_USER      — SSH user on the VM (e.g. ubuntu)
#   DEPLOY_SSH_KEY   — Private SSH key whose public key is in ~/.ssh/authorized_keys on the VM
#   DEPLOY_PATH      — Absolute path to the repo on the VM (e.g. /opt/wildleague/backend)

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull latest code on VM
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && git pull origin main"

      - name: Build and restart containers
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && docker compose up --build -d"

      - name: Run migrations
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && docker compose exec -T api python manage.py migrate --noinput"

      - name: Verify API is healthy
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "docker compose -f ${{ secrets.DEPLOY_PATH }}/docker-compose.yml ps --format json | python3 -c \"
          import sys, json
          services = [json.loads(l) for l in sys.stdin if l.strip()]
          unhealthy = [s['Service'] for s in services if s.get('Health') not in ('healthy', 'running', '')]
          if unhealthy:
              print('Unhealthy services:', unhealthy)
              sys.exit(1)
          print('All services up.')
          \""
